nameOverride: ""
fullnameOverride: ""

replicaCount: 3

image:
  repository: nginx
  tag: "1.27.0"
  pullPolicy: IfNotPresent

containerPort: 80

service:
  type: LoadBalancer
  port: 80
  targetPort: 80
  annotations:
    metallb.io/loadBalancerIPs: "192.168.200.240"

nginx:
  statusPort: 8080
  statusPath: /stub_status

metrics:
  enabled: true
  port: 9113
  path: /metrics
  service:
    type: ClusterIP
    port: 9113

exporter:
  image:
    repository: nginx/nginx-prometheus-exporter
    tag: "1.5.1"
    pullPolicy: IfNotPresent
  scrapeUri: "http://127.0.0.1:8080/stub_status"
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}