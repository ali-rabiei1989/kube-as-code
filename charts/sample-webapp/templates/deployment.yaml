apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sample-webapp.fullname" . }}
  labels:
    {{- include "sample-webapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "sample-webapp.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "sample-webapp.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}

    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
            - name: nginx-status
              containerPort: {{ .Values.nginx.statusPort }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true

        {{- if .Values.metrics.enabled }}
        - name: nginx-exporter
          image: "{{ .Values.exporter.image.repository }}:{{ .Values.exporter.image.tag }}"
          imagePullPolicy: {{ .Values.exporter.image.pullPolicy }}

          args:
            - --nginx.scrape-uri={{ .Values.exporter.scrapeUri }}

          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP

          resources:
            {{- toYaml .Values.exporter.resources | nindent 12 }}
        {{- end }}

      volumes:
        - name: html
          configMap:
            name: {{ include "sample-webapp.fullname" . }}-html

        - name: nginx-conf
          configMap:
            name: {{ include "sample-webapp.fullname" . }}-nginx-conf

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}