apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sample-webapp.fullname" . }}-html
  labels:
    {{- include "sample-webapp.labels" . | nindent 4 }}
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Sample WebApp</title>
    </head>
    <body>
      <h1>Hello from Kubernetes!</h1>
      <p>Sample application deployed by Helm.</p>
      <p>This application is exposed through MetalLB LoadBalancer.</p>
      <p>Nginx metrics are exported by nginx-prometheus-exporter sidecar.</p>
    </body>
    </html>

  healthz: |
    ok

  readyz: |
    ready

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sample-webapp.fullname" . }}-nginx-conf
  labels:
    {{- include "sample-webapp.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location = /healthz {
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /readyz {
            default_type text/plain;
            return 200 "ready\n";
        }
    }

    server {
        listen {{ .Values.nginx.statusPort }};
        server_name 127.0.0.1;

        access_log off;

        location = {{ .Values.nginx.statusPath }} {
            stub_status;
            allow 127.0.0.1;
            deny all;
        }
    }